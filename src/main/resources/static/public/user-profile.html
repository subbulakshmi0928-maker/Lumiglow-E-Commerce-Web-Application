<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LumiGlow | My Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --rose: #e8147a;
  --deep: #b50060;
  --velvet: #7a0040;
  --blush: #fce8f3;
  --petal: #f9d0e8;
  --silk: #fff5fa;
  --cream: #fffaf8;
  --muted: #a0607a;
  --ink: #2a0015;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%, rgba(252,232,243,0.9) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(249,208,232,0.6) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

.card {
  display: flex;
  width: 700px;
  border-radius: 26px;
  overflow: hidden;
  box-shadow: 0 12px 50px rgba(180,0,80,0.13);
  border: 1px solid rgba(232,20,122,0.09);
  position: relative;
  z-index: 1;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

.panel {
  width: 220px;
  flex-shrink: 0;
  background: linear-gradient(175deg, #fff0f8, #ffe4f2 55%, #ffd6ec);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 20px 30px;
  position: relative;
  overflow: hidden;
}

.panel::before {
  content: '';
  position: absolute;
  top: -60px; left: -60px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,20,122,0.12), transparent 70%);
}

.panel::after {
  content: '';
  position: absolute;
  bottom: -40px; right: -40px;
  width: 130px; height: 130px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(181,0,96,0.09), transparent 70%);
}

.avatar-ring {
  width: 90px; height: 90px;
  border-radius: 50%;
  border: 1.5px solid rgba(232,20,122,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 6px;
  position: relative;
  z-index: 1;
}

.avatar {
  width: 78px; height: 78px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f0196a, #8a003e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  color: white;
  box-shadow: 0 8px 24px rgba(180,0,80,0.30);
  letter-spacing: 1px;
}

.panel-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 400;
  color: var(--velvet);
  text-align: center;
  position: relative;
  z-index: 1;
  letter-spacing: 0.5px;
  margin-top: 10px;
}

.panel-name em { font-style: italic; color: var(--rose); font-weight: 600; }

.panel-email {
  font-size: 11px;
  color: var(--muted);
  margin-top: 5px;
  text-align: center;
  position: relative;
  z-index: 1;
  word-break: break-all;
  line-height: 1.5;
}

.panel-divider {
  width: 40px;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--rose), transparent);
  margin: 18px auto;
  position: relative;
  z-index: 1;
}

.panel-badge {
  background: var(--blush);
  border: 0.5px solid rgba(232,20,122,0.18);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 9.5px;
  font-weight: 500;
  color: var(--rose);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}

.panel-logo-area {
  margin-top: auto;
  padding-top: 24px;
  text-align: center;
  position: relative;
  z-index: 1;
}

.logo-eyebrow {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 4px;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 300;
  color: var(--rose);
  letter-spacing: 2px;
}

.logo em { font-style: italic; font-weight: 600; }

.form-side {
  flex: 1;
  background: white;
  padding: 36px 32px;
}

.form-header { margin-bottom: 26px; }

.form-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 300;
  color: var(--ink);
  letter-spacing: 0.5px;
}

.form-header h2 em { font-style: italic; color: var(--rose); font-weight: 600; }

.form-header p { font-size: 11.5px; color: var(--muted); margin-top: 5px; }

.field { margin-bottom: 18px; }

.field label {
  display: block;
  font-size: 9px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 7px;
}

.field input {
  width: 100%;
  background: var(--silk);
  border: 1px solid rgba(232,20,122,0.12);
  border-radius: 12px;
  padding: 11px 15px;
  font-size: 13.5px;
  color: var(--ink);
  outline: none;
  transition: all 0.22s;
  font-family: 'DM Sans', sans-serif;
}

.field input::placeholder { color: rgba(160,96,122,0.45); }

.field input:disabled {
  background: var(--blush);
  color: var(--muted);
  cursor: not-allowed;
  border-color: rgba(232,20,122,0.08);
}

.field input:focus {
  border-color: rgba(232,20,122,0.45);
  background: white;
  box-shadow: 0 0 0 3px rgba(232,20,122,0.07);
}

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.update-btn {
  width: 100%;
  padding: 13px;
  margin-top: 6px;
  background: linear-gradient(135deg, #f0196a 0%, #c2005a 50%, #8a003e 100%);
  color: white;
  border: none;
  border-radius: 13px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  box-shadow: 0 8px 26px rgba(180,0,80,0.26);
  transition: all 0.25s;
}

.update-btn:hover { box-shadow: 0 14px 34px rgba(180,0,80,0.36); transform: translateY(-2px); }
.update-btn:active { transform: scale(0.98); }

.status-msg {
  display: none;
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 11px;
  font-size: 12px;
  font-weight: 500;
  text-align: center;
}

.status-msg.success { background: #e8f8ef; color: #1a7a42; border: 1px solid #a7e3bf; }
.status-msg.error { background: var(--blush); color: var(--deep); border: 1px solid rgba(232,20,122,0.20); }

@media (max-width: 720px) {
  .card { flex-direction: column; width: 94vw; }
  .panel { width: 100%; flex-direction: row; flex-wrap: wrap; padding: 24px 20px; justify-content: center; gap: 12px; }
  .panel-logo-area { display: none; }
  .row { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="card">

  <!-- LEFT PANEL -->
  <div class="panel">
    <div class="avatar-ring">
      <div class="avatar" id="avatarText">?</div>
    </div>
    <div class="panel-name" id="panelName">Your <em>Name</em></div>
    <div class="panel-email" id="panelEmail">—</div>
    <div class="panel-divider"></div>
    <div class="panel-badge">Member</div>
    <div class="panel-logo-area">
      <p class="logo-eyebrow">Luxe Beauty</p>
      <div class="logo"><em>Lumi</em>Glow</div>
    </div>
  </div>

  <!-- RIGHT FORM -->
  <div class="form-side">
    <div class="form-header">
      <h2>My <em>Profile</em></h2>
      <p>Update your personal details below</p>
    </div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name">
    </div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="emailField" disabled>
    </div>

    <div class="row">
      <div class="field">
        <label>Phone</label>
        <input type="text" id="phone" placeholder="+91 98765 43210">
      </div>
      <div class="field">
        <label>Address</label>
        <input type="text" id="address" placeholder="Your city or street">
      </div>
    </div>

    <button class="update-btn" onclick="updateProfile()">Update Profile</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>

</div>

<script>
// Get email from localStorage — check both keys
const email = localStorage.getItem("userEmail") || localStorage.getItem("email");

function showStatus(msg, type) {
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.className = "status-msg " + type;
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 4000);
}

async function loadProfile() {
  if (!email) {
    showStatus("No user logged in! Please login first.", "error");
    setTimeout(() => { window.location.href = "user-login.html"; }, 2000);
    return;
  }

  try {
    const res = await fetch("http://localhost:8080/user/" + encodeURIComponent(email));
    if (!res.ok) throw new Error("Server error: " + res.status);
    const data = await res.json();

    document.getElementById("name").value    = data.name    || "";
    document.getElementById("emailField").value = data.email || email;
    document.getElementById("phone").value   = data.phone   || "";
    document.getElementById("address").value = data.address || "";

    // Update left panel
    if (data.name) {
      const initials = data.name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
      document.getElementById("avatarText").textContent = initials;
      const parts = data.name.split(" ");
      document.getElementById("panelName").innerHTML =
        parts[0] + (parts[1] ? ' <em>' + parts[1] + '</em>' : '');
    }

    document.getElementById("panelEmail").textContent = data.email || email;

  } catch (err) {
    console.error(err);
    showStatus("Failed to load profile. Please try again.", "error");
  }
}

async function updateProfile() {
  const name    = document.getElementById("name").value.trim();
  const phone   = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();

  if (!name || !phone || !address) {
    showStatus("Please fill in all fields!", "error");
    return;
  }

  try {
    const res = await fetch("http://localhost:8080/update-user/" + encodeURIComponent(email), {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, phone, address })
    });

    const msg = await res.text();

    if (msg.toLowerCase().includes("updated")) {
      // Update panel name live
      const parts = name.split(" ");
      document.getElementById("panelName").innerHTML =
        parts[0] + (parts[1] ? ' <em>' + parts[1] + '</em>' : '');
      const initials = name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
      document.getElementById("avatarText").textContent = initials;

      showStatus("Profile updated successfully!", "success");
    } else {
      showStatus(msg || "Update failed. Try again.", "error");
    }

  } catch (err) {
    console.error(err);
    showStatus("Server error. Please try again.", "error");
  }
}

loadProfile();
</script>

</body>
</html>

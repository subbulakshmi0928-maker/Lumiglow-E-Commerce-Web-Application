<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiGlow Admin | Order Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --sidebar-pink: #2d0b1a;
    --accent-pink: #ff2d8d;
    --light-pink: #fff0f6;
    --white: #ffffff;
}

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    display: flex;
    background-color: #f8f9fa;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    background: var(--sidebar-pink);
    color: white;
    position: fixed;
    padding-top: 20px;
}

.sidebar h2 {
    text-align: center;
    font-size: 20px;
    color: var(--accent-pink);
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 15px 25px;
    text-decoration: none;
    transition: 0.3s;
    border-left: 4px solid transparent;
}

.sidebar a:hover,
.sidebar a.active {
    background: rgba(255, 45, 141, 0.1);
    border-left: 4px solid var(--accent-pink);
    color: var(--accent-pink);
}

/* MAIN */
.main-content {
    margin-left: 250px;
    padding: 40px;
    width: calc(100% - 250px);
}

.header-flex {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.btn-back {
    background: var(--light-pink);
    color: var(--sidebar-pink);
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    border: 1px solid #ffc2df;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: var(--light-pink);
    color: var(--sidebar-pink);
    padding: 15px;
    text-align: left;
    border-bottom: 2px solid #ffc2df;
}

td {
    padding: 15px;
    border-bottom: 1px solid #eee;
}

.status-box {
    margin-top: 30px;
    padding: 20px;
    background: #fdf2f7;
    border-radius: 10px;
    display: flex;
    gap: 15px;
    align-items: center;
}

select {
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ddd;
}

.btn-update {
    background: var(--accent-pink);
    color: white;
    border: none;
    padding: 10px 25px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>LumiGlow Admin</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="categories.html">Categories</a>
    <a href="orders.html" class="active">Orders</a>
    <a href="customers.html">Customers</a>
    <a href="logout.html">Logout</a>
</div>

<div class="main-content">

<div class="header-flex">
    <h1 style="color: var(--sidebar-pink);">
        Order Details
    </h1>

    <a href="payment-management.html" class="btn-back">
        ← Back to Orders
    </a>
</div>

<div class="card">

<h3 id="orderIdText"
style="color: var(--accent-pink);">
Loading Order...
</h3>

<table>

<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="orderTableBody">
</tbody>

</table>

<div class="status-box">

<strong>
Update Order Status:
</strong>

<select id="statusSelect">
<option value="Pending">Pending</option>
<option value="Shipped">Shipped</option>
<option value="Delivered">Delivered</option>
</select>

<button
class="btn-update"
onclick="updateStatus()">
Apply Change
</button>

</div>

</div>
</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const id =
params.get("id");

async function loadData() {

if (!id) return;

document.getElementById(
"orderIdText"
).innerText =
"Order ID: #" + id;

try {

const res =
await fetch(
`http://localhost:8080/api/order-details/${id}`
);

const data =
await res.json();

let html = "";

let grandTotal = 0;

data.forEach(item => {

let rowTotal =
item.price *
item.quantity;

grandTotal +=
rowTotal;

html += `

<tr>

<td>
${item.productName}
</td>

<td>
₹${item.price}
</td>

<td>
${item.quantity}
</td>

<td style="font-weight:600;">
₹${rowTotal}
</td>

</tr>

`;

});

html += `

<tr style="
background:#fff0f6;
font-weight:bold;
">

<td colspan="3"
style="text-align:right;">
Grand Total:
</td>

<td>
₹${grandTotal}
</td>

</tr>

`;

document.getElementById(
"orderTableBody"
).innerHTML = html;

}

catch (err) {

console.error(err);

}

}

async function updateStatus() {

const status =
document.getElementById(
"statusSelect"
).value;

try {

const res =
await fetch(
`http://localhost:8080/api/update-order/${id}`,
{
method: "PUT",

headers: {
"Content-Type":
"application/json"
},

body:
JSON.stringify({
status: status
})

}
);

const msg =
await res.text();

alert(msg);

}

catch (err) {

alert(
"Error updating status"
);

}

}

loadData();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product | LumiGlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blush: #fce8f3; --petal: #f9d0e8; --rose: #e8147a; --deep-rose: #b50060;
            --velvet: #7a0040; --cream: #fffaf8; --silk: #fff5fa; --ink: #2a0015;
            --muted: #a0607a; --card-shadow: 0 8px 40px rgba(180,0,80,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; display: flex; overflow-x: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 10% 0%, rgba(252,232,243,0.9) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 90% 100%, rgba(249,208,232,0.6) 0%, transparent 55%); pointer-events: none; z-index: 0; }
        .sidebar { width: 270px; min-height: 100vh; position: fixed; top: 0; left: 0; bottom: 0; background: linear-gradient(175deg, #fff0f8 0%, #ffe4f2 60%, #ffd6ec 100%); border-right: 1px solid rgba(232,20,122,0.10); display: flex; flex-direction: column; z-index: 100; box-shadow: 4px 0 40px rgba(180,0,80,0.06); }
        .sidebar::before { content: ''; position: absolute; top: -80px; left: -80px; width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle, rgba(232,20,122,0.08), transparent 70%); pointer-events: none; }
        .sidebar::after { content: ''; position: absolute; bottom: -60px; right: -60px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(181,0,96,0.07), transparent 70%); pointer-events: none; }
        .logo-box { padding: 44px 32px 28px; position: relative; }
        .logo-eyebrow { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 6px; }
        .logo-box h2 { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 300; color: var(--rose); letter-spacing: 3px; line-height: 1; }
        .logo-box h2 em { font-style: italic; font-weight: 600; }
        .logo-divider { width: 40px; height: 1.5px; background: linear-gradient(90deg, var(--rose), transparent); margin-top: 16px; }
        .nav-section-label { padding: 0 32px; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin: 20px 0 10px; opacity: 0.7; }
        nav { padding: 0 18px; flex: 1; }
        nav a { display: flex; align-items: center; gap: 14px; padding: 13px 18px; text-decoration: none; color: var(--velvet); font-size: 12.5px; font-weight: 500; margin-bottom: 3px; border-radius: 14px; transition: all 0.25s cubic-bezier(0.4,0,0.2,1); letter-spacing: 0.3px; position: relative; overflow: hidden; cursor: pointer; }
        nav a::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(232,20,122,0.10), rgba(232,20,122,0.04)); opacity: 0; border-radius: inherit; transition: opacity 0.25s; }
        nav a:hover::before { opacity: 1; }
        nav a:hover { color: var(--rose); transform: translateX(4px); }
        nav a.active { background: linear-gradient(90deg, rgba(232,20,122,0.13), rgba(232,20,122,0.05)); color: var(--rose); }
        .nav-icon { width: 32px; height: 32px; background: white; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 8px rgba(180,0,80,0.08); transition: all 0.25s; flex-shrink: 0; }
        nav a:hover .nav-icon, nav a.active .nav-icon { background: var(--rose); box-shadow: 0 4px 14px rgba(232,20,122,0.3); }
        .sidebar-footer { padding: 24px 36px 32px; border-top: 1px solid rgba(232,20,122,0.08); }
        .sidebar-footer a { display: flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 500; color: var(--muted); text-decoration: none; letter-spacing: 0.5px; transition: color 0.2s; cursor: pointer; }
        .sidebar-footer a:hover { color: var(--rose); }
        .content { margin-left: 270px; padding: 48px 48px 48px 44px; flex: 1; position: relative; z-index: 1; }
        .page-header { margin-bottom: 40px; animation: fadeUp 0.4s ease both; }
        .page-header .greeting { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
        .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 300; line-height: 1.1; letter-spacing: 1px; }
        .page-header h1 em { font-style: italic; color: var(--rose); font-weight: 600; }
        .form-card { background: white; border-radius: 24px; padding: 40px 44px; border: 1px solid rgba(232,20,122,0.07); box-shadow: var(--card-shadow); max-width: 680px; animation: fadeUp 0.5s ease both 0.1s; }
        .form-card-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; letter-spacing: 0.5px; margin-bottom: 32px; }
        .form-card-title em { font-style: italic; color: var(--rose); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-row.full { grid-template-columns: 1fr; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-weight: 500; margin-bottom: 10px; }
        .input-group input, .input-group select, .input-group textarea { padding: 14px 18px; border: 1.5px solid rgba(232,20,122,0.12); border-radius: 14px; background: var(--silk); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); transition: all 0.25s; outline: none; width: 100%; }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: var(--rose); background: white; box-shadow: 0 0 0 4px rgba(232,20,122,0.07); }
        .input-group input::placeholder, .input-group textarea::placeholder { color: #c9a0b4; }
        .input-group select { appearance: none; cursor: pointer; }
        .input-group textarea { resize: vertical; min-height: 90px; }
        .btn-row { display: flex; gap: 14px; margin-top: 10px; }
        .btn-update { flex: 1; padding: 16px; background: linear-gradient(135deg, var(--rose), var(--deep-rose)); color: white; border: none; border-radius: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13.5px; letter-spacing: 0.5px; transition: all 0.25s; box-shadow: 0 4px 20px rgba(232,20,122,0.3); }
        .btn-update:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,20,122,0.4); }
        .btn-update:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .btn-cancel { padding: 16px 28px; background: var(--blush); color: var(--rose); border: none; border-radius: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px; transition: all 0.25s; }
        .btn-cancel:hover { background: var(--petal); transform: translateY(-2px); }
        .status-msg { text-align: center; margin-top: 16px; font-size: 13px; font-weight: 500; min-height: 20px; }
        .loading-bar { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 900px) { .sidebar { width: 70px; } .sidebar .nav-text, .logo-box h2, .logo-eyebrow, .logo-divider, .nav-section-label, .sidebar-footer span { display: none; } .content { margin-left: 70px; padding: 28px; } nav a { justify-content: center; padding: 12px; } }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .content { padding: 24px 18px; } .btn-row { flex-direction: column; } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-box">
        <p class="logo-eyebrow">Luxe Admin Panel</p>
        <h2><em>Lumi</em>Glow</h2>
        <div class="logo-divider"></div>
    </div>
    <p class="nav-section-label">Catalog</p>
    <nav>
        <a onclick="goAdd()"><span class="nav-icon">✦</span><span class="nav-text">Add Product</span></a>
        <a onclick="goView()"><span class="nav-icon">🌸</span><span class="nav-text">View Store</span></a>
        <a class="active" onclick="goProductList()"><span class="nav-icon">📦</span><span class="nav-text">Product List</span></a>
        <a onclick="goCategory()"><span class="nav-icon">🗂</span><span class="nav-text">Categories</span></a>
    </nav>
    <p class="nav-section-label">Commerce</p>
    <nav>
        <a onclick="goOrders()"><span class="nav-icon">🛒</span><span class="nav-text">Orders</span></a>
        <a onclick="goCustomers()"><span class="nav-icon">👥</span><span class="nav-text">Customers</span></a>
        <a onclick="goPayments()"><span class="nav-icon">💳</span><span class="nav-text">Payments</span></a>
    </nav>
    <div class="sidebar-footer">
        <a onclick="logout()"><span style="font-size:14px;">⟵</span><span class="nav-text">Sign Out</span></a>
    </div>
</aside>

<main class="content">
    <div class="page-header">
        <p class="greeting">Catalog Management</p>
        <h1>Edit <em>Product</em></h1>
    </div>
    <div class="form-card" id="formWrapper">
        <div class="loading-bar">🌸 Loading product details…</div>
    </div>
</main>

<script>
    function goAdd()         { window.location.href = "add-product.html"; }
    function goView()        { window.location.href = "home1.html"; }
    function goProductList() { window.location.href = "product-list.html"; }
    function goCategory()    { window.location.href = "category-management.html"; }
    function goOrders()      { window.location.href = "order.html"; }
    function goCustomers()   { window.location.href = "admin-orders.html"; }
    function goPayments()    { window.location.href = "payment-management.html"; }
    function logout()        { window.location.href = "admin.html"; }

    const params    = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    function escHtml(str) {
        return String(str || '')
            .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
            .replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function loadData() {
        if (!productId) {
            document.getElementById("formWrapper").innerHTML =
                '<div class="loading-bar" style="color:#c62828;">❌ No product ID in URL.</div>';
            return;
        }
        try {
            const res = await fetch('http://localhost:8080/products/' + productId);
            if (!res.ok) throw new Error("Status: " + res.status);
            const p = await res.json();
            renderForm(p);
        } catch (err) {
            console.error("Load Error:", err);
            document.getElementById("formWrapper").innerHTML =
                '<div class="loading-bar" style="color:#c62828;">❌ Failed to load product. Is Spring Boot running?</div>';
        }
    }

    function renderForm(p) {
        const categories = ['Haircare', 'Makeup', 'Beauty Tool', 'Skincare'];
        const currentCat = (p.category && p.category.name) ? p.category.name : '';
        const options = categories.map(c =>
            '<option value="' + c + '"' + (currentCat === c ? ' selected' : '') + '>' + c + '</option>'
        ).join('');

        document.getElementById("formWrapper").innerHTML =
            '<h3 class="form-card-title">Update <em>Details</em></h3>' +

            '<div class="form-row">' +
                '<div class="input-group"><label>Product Name</label>' +
                '<input type="text" id="name" value="' + escHtml(p.name) + '"></div>' +
                '<div class="input-group"><label>Price (₹)</label>' +
                '<input type="number" id="price" value="' + (p.price || 0) + '" min="0"></div>' +
            '</div>' +

            '<div class="form-row">' +
                '<div class="input-group"><label>Stock Quantity</label>' +
                '<input type="number" id="quantity" value="' + (p.quantity || 0) + '" min="0"></div>' +
                '<div class="input-group"><label>Net Weight</label>' +
                '<input type="text" id="net_weight" value="' + escHtml(p.net_weight) + '"></div>' +
            '</div>' +

            '<div class="form-row">' +
                '<div class="input-group"><label>Category</label>' +
                '<select id="category"><option value="">Select Category</option>' + options + '</select></div>' +
                '<div class="input-group"><label>Image URL</label>' +
                '<input type="text" id="image" value="' + escHtml(p.image) + '"></div>' +
            '</div>' +

            '<div class="form-row full">' +
                '<div class="input-group"><label>Description</label>' +
                '<textarea id="description">' + escHtml(p.description) + '</textarea></div>' +
            '</div>' +

            '<div class="btn-row">' +
                '<button class="btn-update" id="updateBtn" onclick="updateProduct()">✦ &nbsp; Update Product</button>' +
                '<button class="btn-cancel" onclick="goProductList()">Cancel</button>' +
            '</div>' +
            '<div class="status-msg" id="status"></div>';
    }

    async function updateProduct() {
        const statusEl  = document.getElementById("status");
        const updateBtn = document.getElementById("updateBtn");

        const payload = {
            name:        document.getElementById("name").value.trim(),
            price:       Number(document.getElementById("price").value),
            quantity:    Number(document.getElementById("quantity").value),
            net_weight:  document.getElementById("net_weight").value.trim(),
            description: document.getElementById("description").value.trim(),
            image:       document.getElementById("image").value.trim(),
            category:    document.getElementById("category").value  // plain string — controller handles lookup
        };

        if (!payload.name) {
            statusEl.innerHTML = '<span style="color:#c62828;">❌ Product name is required.</span>';
            return;
        }

        updateBtn.disabled = true;
        updateBtn.textContent = "Saving…";
        statusEl.innerHTML = "";

        try {
            const res = await fetch('http://localhost:8080/products/update/' + productId, {
                method:  'PUT',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload)
            });

            let data = null;
            try { data = await res.json(); } catch { data = null; }
            console.log("Status:", res.status, "| Response:", data);

            if (!res.ok) {
                const msg = (data && data.message) ? data.message : ('Error ' + res.status);
                statusEl.innerHTML = '<span style="color:#c62828;">❌ ' + msg + '</span>';
                return;
            }

            statusEl.innerHTML = '<span style="color:#2e7d32;">✅ Product Updated Successfully</span>';
            setTimeout(() => window.location.href = "product-list.html", 1200);

        } catch (err) {
            console.error("Update Error:", err);
            statusEl.innerHTML = '<span style="color:#c62828;">❌ Cannot connect to server. Is Spring Boot running?</span>';
        } finally {
            updateBtn.disabled = false;
            updateBtn.innerHTML = "✦ &nbsp; Update Product";
        }
    }

    loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiGlow | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --blush: #fce8f3;
            --petal: #f9d0e8;
            --rose: #e8147a;
            --deep-rose: #b50060;
            --velvet: #7a0040;
            --cream: #fffaf8;
            --silk: #fff5fa;
            --ink: #2a0015;
            --muted: #a0607a;
            --card-shadow: 0 8px 40px rgba(180,0,80,0.10);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 10% 0%, rgba(252,232,243,0.9) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 100%, rgba(249,208,232,0.6) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            width: 420px;
            background: white;
            border-radius: 24px;
            padding: 44px 40px;
            border: 1px solid rgba(232,20,122,0.08);
            box-shadow: var(--card-shadow);
            position: relative;
            z-index: 1;
            overflow: hidden;
            animation: fadeUp 0.5s ease both;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(249,208,232,0.45), transparent 70%);
            pointer-events: none;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -50px; left: -50px;
            width: 140px; height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232,20,122,0.07), transparent 70%);
            pointer-events: none;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }

        .logo-eyebrow {
            font-size: 9px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 300;
            color: var(--rose);
            letter-spacing: 3px;
            line-height: 1;
            margin-bottom: 6px;
        }

        .logo em { font-style: italic; font-weight: 600; }

        .logo-divider {
            width: 36px;
            height: 1.5px;
            background: linear-gradient(90deg, var(--rose), transparent);
            margin: 10px auto 14px;
        }

        .card-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 300;
            color: var(--ink);
            letter-spacing: 0.5px;
        }

        .card-header h2 em {
            font-style: italic;
            color: var(--rose);
            font-weight: 600;
        }

        .field {
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .field label {
            display: block;
            font-size: 9px;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 7px;
        }

        .field label span {
            color: rgba(160,96,122,0.45);
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }

        .field input {
            width: 100%;
            background: var(--silk);
            border: 1px solid rgba(232,20,122,0.12);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13.5px;
            color: var(--ink);
            outline: none;
            transition: all 0.22s;
            font-family: 'DM Sans', sans-serif;
        }

        .field input::placeholder { color: rgba(160,96,122,0.5); }

        .field input:focus {
            border-color: rgba(232,20,122,0.45);
            background: white;
            box-shadow: 0 0 0 3px rgba(232,20,122,0.07);
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: linear-gradient(135deg, #f0196a 0%, #c2005a 50%, #8a003e 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 8px 28px rgba(180,0,80,0.28);
            transition: all 0.25s;
            position: relative;
            z-index: 1;
        }

        .register-btn:hover {
            box-shadow: 0 12px 36px rgba(180,0,80,0.38);
            transform: translateY(-2px);
        }

        .register-btn:active { transform: scale(0.98); }
        .register-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .status-msg {
            display: none;
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 11px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .status-msg.success {
            background: #e8f8ef;
            color: #1a7a42;
            border: 1px solid #a7e3bf;
        }

        .status-msg.error {
            background: var(--blush);
            color: var(--deep-rose);
            border: 1px solid rgba(232,20,122,0.20);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0 16px;
            position: relative;
            z-index: 1;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(232,20,122,0.10);
        }

        .divider span {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .signin {
            text-align: center;
            font-size: 12.5px;
            color: var(--muted);
            position: relative;
            z-index: 1;
        }

        .signin a {
            color: var(--rose);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .signin a:hover { color: var(--deep-rose); }
    </style>
</head>

<body>

<div class="card">

    <div class="card-header">
        <p class="logo-eyebrow">Luxe Beauty</p>
        <div class="logo"><em>Lumi</em>Glow</div>
        <div class="logo-divider"></div>
        <h2>Create your <em>account</em></h2>
    </div>

    <div class="field">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your full name" required>
    </div>

    <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
    </div>

    <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" required>
    </div>

    <div class="field">
        <label>Phone <span>(optional)</span></label>
        <input type="text" id="phone" placeholder="+91 98765 43210">
    </div>

    <div class="field">
        <label>Address <span>(optional)</span></label>
        <input type="text" id="address" placeholder="Your city or street">
    </div>

    <button class="register-btn" id="regBtn" onclick="registerUser()">Create Account</button>
    <div class="status-msg" id="statusMsg"></div>

    <div class="divider"><span>already have an account?</span></div>
    <p class="signin"><a href="user-login.html">Sign in instead →</a></p>

</div>

<script>
function showStatus(msg, type) {
    const el = document.getElementById("statusMsg");
    el.textContent = msg;
    el.className = "status-msg " + type;
    el.style.display = "block";
    if (type === "error") setTimeout(() => { el.style.display = "none"; }, 4000);
}

async function registerUser() {
    const name     = document.getElementById("name").value.trim();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const phone    = document.getElementById("phone").value.trim();
    const address  = document.getElementById("address").value.trim();

    if (!name || !email || !password) {
        showStatus("Please fill in name, email and password.", "error");
        return;
    }

    if (password.length < 8) {
        showStatus("Password must be at least 8 characters.", "error");
        return;
    }

    const btn = document.getElementById("regBtn");
    btn.textContent = "Registering...";
    btn.disabled = true;

    try {
        const res = await fetch("http://localhost:8080/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password, phone, address })
        });

        const data = await res.json();

        if (data.success === true) {
            // Save to localStorage so profile page works immediately
            localStorage.setItem("email", email);
            localStorage.setItem("userEmail", email);

            if (data.user && data.user.id) {
                localStorage.setItem("userId", data.user.id);
            }

            showStatus("Account created! Redirecting...", "success");
            setTimeout(() => { window.location.href = "home1.html"; }, 1200);
        } else {
            showStatus(data.message || "Registration failed. Try again.", "error");
            btn.textContent = "Create Account";
            btn.disabled = false;
        }

    } catch (err) {
        console.error(err);
        showStatus("Connection error! Make sure your server is running.", "error");
        btn.textContent = "Create Account";
        btn.disabled = false;
    }
}
</script>

</body>
</html>

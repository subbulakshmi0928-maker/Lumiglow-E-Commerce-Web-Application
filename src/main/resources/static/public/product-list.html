<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiGlow | Manage Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blush: #fce8f3;
            --petal: #f9d0e8;
            --rose: #e8147a;
            --deep-rose: #b50060;
            --velvet: #7a0040;
            --cream: #fffaf8;
            --silk: #fff5fa;
            --ink: #2a0015;
            --muted: #a0607a;
            --card-shadow: 0 8px 40px rgba(180,0,80,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; display: flex; overflow-x: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 10% 0%, rgba(252,232,243,0.9) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 90% 100%, rgba(249,208,232,0.6) 0%, transparent 55%), radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255,245,250,0.8) 0%, transparent 70%); pointer-events: none; z-index: 0; }

        .sidebar { width: 270px; min-height: 100vh; position: fixed; top: 0; left: 0; bottom: 0; background: linear-gradient(175deg, #fff0f8 0%, #ffe4f2 60%, #ffd6ec 100%); border-right: 1px solid rgba(232,20,122,0.10); display: flex; flex-direction: column; z-index: 100; box-shadow: 4px 0 40px rgba(180,0,80,0.06); }
        .sidebar::before { content: ''; position: absolute; top: -80px; left: -80px; width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle, rgba(232,20,122,0.08), transparent 70%); pointer-events: none; }
        .sidebar::after { content: ''; position: absolute; bottom: -60px; right: -60px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(181,0,96,0.07), transparent 70%); pointer-events: none; }
        .logo-box { padding: 44px 32px 28px; position: relative; }
        .logo-eyebrow { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 6px; }
        .logo-box h2 { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 300; color: var(--rose); letter-spacing: 3px; line-height: 1; }
        .logo-box h2 em { font-style: italic; font-weight: 600; }
        .logo-divider { width: 40px; height: 1.5px; background: linear-gradient(90deg, var(--rose), transparent); margin-top: 16px; }
        .nav-section-label { padding: 0 32px; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin: 20px 0 10px; opacity: 0.7; }
        nav { padding: 0 18px; flex: 1; }
        nav a { display: flex; align-items: center; gap: 14px; padding: 13px 18px; text-decoration: none; color: var(--velvet); font-size: 12.5px; font-weight: 500; margin-bottom: 3px; border-radius: 14px; transition: all 0.25s cubic-bezier(0.4,0,0.2,1); letter-spacing: 0.3px; position: relative; overflow: hidden; cursor: pointer; }
        nav a::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(232,20,122,0.10), rgba(232,20,122,0.04)); opacity: 0; border-radius: inherit; transition: opacity 0.25s; }
        nav a:hover::before, nav a.active::before { opacity: 1; }
        nav a:hover, nav a.active { color: var(--rose); transform: translateX(4px); }
        nav a.active { background: rgba(232,20,122,0.07); }
        .nav-icon { width: 32px; height: 32px; background: white; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 8px rgba(180,0,80,0.08); transition: all 0.25s; flex-shrink: 0; }
        nav a:hover .nav-icon, nav a.active .nav-icon { background: var(--rose); box-shadow: 0 4px 14px rgba(232,20,122,0.3); }
        .sidebar-footer { padding: 24px 36px 32px; border-top: 1px solid rgba(232,20,122,0.08); }
        .sidebar-footer a { display: flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 500; color: var(--muted); text-decoration: none; letter-spacing: 0.5px; transition: color 0.2s; cursor: pointer; }
        .sidebar-footer a:hover { color: var(--rose); }

        /* ─── TOP ACTION BUTTONS ─── */
        .top-action-bar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 24px; }
        .btn-dashboard { display: inline-flex; align-items: center; gap: 8px; background: white; border: 1.5px solid rgba(232,20,122,0.20); color: var(--velvet); padding: 10px 20px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.4px; box-shadow: var(--card-shadow); transition: all 0.25s; }
        .btn-dashboard:hover { background: var(--blush); border-color: var(--rose); color: var(--rose); transform: translateY(-1px); }
        .btn-close { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--rose), var(--deep-rose)); color: white; border: none; padding: 10px 20px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.4px; box-shadow: 0 4px 16px rgba(232,20,122,0.30); transition: all 0.25s; }
        .btn-close:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(232,20,122,0.42); }

        .content { margin-left: 270px; padding: 48px 48px 48px 44px; flex: 1; position: relative; z-index: 1; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .header-left .greeting { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
        .header-left h1 { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 300; line-height: 1.1; letter-spacing: 1px; }
        .header-left h1 em { font-style: italic; color: var(--rose); font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 14px; padding-top: 8px; }
        .add-product-btn { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--rose), var(--deep-rose)); color: white; border: none; padding: 13px 24px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; box-shadow: 0 6px 20px rgba(232,20,122,0.35); transition: all 0.25s; }
        .add-product-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(232,20,122,0.45); }
        .date-badge { background: white; border: 1px solid rgba(232,20,122,0.10); border-radius: 50px; padding: 10px 20px; font-size: 11px; font-weight: 400; color: var(--muted); box-shadow: var(--card-shadow); }
        .toolbar { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
        .search-wrap { position: relative; flex: 1; }
        .search-wrap input { width: 100%; padding: 13px 18px 13px 44px; border: 1.5px solid rgba(232,20,122,0.15); border-radius: 14px; background: white; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); outline: none; box-shadow: var(--card-shadow); transition: border-color 0.2s; }
        .search-wrap input:focus { border-color: var(--rose); }
        .search-wrap input::placeholder { color: var(--muted); }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: 0.4; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 24px; }
        .card { background: white; border-radius: 24px; padding: 24px 20px; text-align: center; border: 1px solid rgba(232,20,122,0.07); box-shadow: var(--card-shadow); transition: all 0.35s cubic-bezier(0.4,0,0.2,1); animation: fadeUp 0.5s ease both; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, rgba(249,208,232,0.4), transparent 70%); transition: transform 0.4s; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 24px 60px rgba(180,0,80,0.16); border-color: rgba(232,20,122,0.20); }
        .card:hover::before { transform: scale(1.4); }
        .card-img-wrap { width: 120px; height: 120px; margin: 0 auto 16px; border-radius: 18px; overflow: hidden; background: var(--blush); box-shadow: 0 6px 20px rgba(180,0,80,0.10); }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .card h3 { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: var(--ink); margin-bottom: 6px; letter-spacing: 0.3px; }
        .price { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--rose); margin-bottom: 4px; }
        .stock { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 18px; }
        .btn-group { display: flex; justify-content: center; gap: 8px; position: relative; z-index: 1; }
        .btn-edit { padding: 8px 18px; border: none; border-radius: 10px; background: rgba(246,174,45,0.15); color: #a07800; font-family: 'DM Sans', sans-serif; font-size: 11.5px; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
        .btn-edit:hover { background: #f6ae2d; color: white; box-shadow: 0 4px 14px rgba(246,174,45,0.4); }
        .btn-delete { padding: 8px 18px; border: none; border-radius: 10px; background: rgba(220,53,69,0.10); color: #c0392b; font-family: 'DM Sans', sans-serif; font-size: 11.5px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-delete:hover { background: #e74c3c; color: white; box-shadow: 0 4px 14px rgba(231,76,60,0.35); }
        .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
        .empty-state .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.35; }
        .empty-state p { font-size: 14px; }
        .loading { text-align: center; padding: 80px; color: var(--muted); font-size: 13px; letter-spacing: 1px; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--petal); border-top-color: var(--rose); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @media (max-width: 900px) { .sidebar { width: 70px; } .sidebar .nav-text, .logo-box h2, .logo-eyebrow, .logo-divider, .nav-section-label, .sidebar-footer span { display: none; } .content { margin-left: 70px; padding: 28px; } nav a { justify-content: center; padding: 12px; } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-box">
        <p class="logo-eyebrow">Luxe Admin Panel</p>
        <h2><em>Lumi</em>Glow</h2>
        <div class="logo-divider"></div>
    </div>

    <p class="nav-section-label">Catalog</p>
    <nav>
        <a href="add-product.html"><span class="nav-icon">✦</span><span class="nav-text">Add Product</span></a>
        <a href="home1.html"><span class="nav-icon">🌸</span><span class="nav-text">View Store</span></a>
        <a href="product-list.html" class="active"><span class="nav-icon">📦</span><span class="nav-text">Product List</span></a>
        <a href="category-management.html"><span class="nav-icon">🗂</span><span class="nav-text">Categories</span></a>
    </nav>

    <p class="nav-section-label">Commerce</p>
    <nav>
        <a href="order.html"><span class="nav-icon">🛒</span><span class="nav-text">Orders</span></a>
        <a href="admin-orders.html"><span class="nav-icon">👥</span><span class="nav-text">Customers</span></a>
        <a href="payment-management.html"><span class="nav-icon">💳</span><span class="nav-text">Payments</span></a>
    </nav>

    <div class="sidebar-footer">
        <a href="admin.html"><span style="font-size:14px;">⟵</span><span class="nav-text">Sign Out</span></a>
    </div>
</aside>

<main class="content">

    <!-- ── TOP ACTION BUTTONS ── -->
    <div class="top-action-bar">
        <button class="btn-dashboard" onclick="goDashboard()">🏠 &nbsp;Dashboard</button>
        <button class="btn-close" onclick="closePage()">✕ &nbsp;Close</button>
    </div>

    <div class="header">
        <div class="header-left">
            <p class="greeting">Catalog</p>
            <h1>Manage <em>Products</em></h1>
        </div>
        <div class="header-right">
            <button class="add-product-btn" onclick="location.href='add-product.html'">✦ Add Product</button>
            <div class="date-badge" id="currentDate"></div>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search products by name…" oninput="filterProducts()">
        </div>
    </div>

    <div class="products" id="productList">
        <div class="loading" style="grid-column:1/-1;">
            <div class="spinner"></div>
            Loading products…
        </div>
    </div>
</main>

<script>
const d = new Date();
document.getElementById('currentDate').textContent =
    d.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'long', year:'numeric' });

let allProducts = [];

function renderProducts(list) {
    const container = document.getElementById("productList");
    if (!list.length) {
        container.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📦</div><p>No products found.</p></div>`;
        return;
    }
    let html = "";
    list.forEach((p, i) => {
        html += `
        <div class="card" style="animation-delay:${i * 0.05}s;">
            <div class="card-img-wrap">
                <img src="${p.image}" alt="${p.name}" onerror="this.src='https://placehold.co/120x120/fce8f3/e8147a?text=✦'">
            </div>
            <h3>${p.name}</h3>
            <p class="price">₹${p.price}</p>
            <p class="stock">Stock: ${p.quantity} units</p>
            <div class="btn-group">
                <button class="btn-edit" onclick="location.href='edit-product.html?id=${p.id}'">Edit</button>
                <button class="btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

function filterProducts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderProducts(allProducts.filter(p => (p.name || '').toLowerCase().includes(q)));
}

async function deleteProduct(id) {
    if(confirm("Delete this product?")) {
        try {
            await fetch(`http://localhost:8080/delete-product/${id}`, { method: "DELETE" });
            loadProducts();
        } catch (err) { alert("Error deleting product"); }
    }
}

async function loadProducts() {
    try {
        const res = await fetch("http://localhost:8080/products");
        const data = await res.json();
        allProducts = Array.isArray(data) ? data : [];
        renderProducts(allProducts);
    } catch (err) {
        document.getElementById("productList").innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">⚠️</div><p>Failed to load products. Check server.</p></div>`;
    }
}

/* ── NEW: Dashboard & Close ── */
function goDashboard() { window.location.href = "dashboard.html"; }
function closePage()   { window.close(); }

loadProducts();
</script>
</body>
</html>
